name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 0,3'   # tiap Minggu & Rabu jam 00:00 UTC
  workflow_dispatch:         # supaya bisa dijalankan manual untuk tes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://tdxohffsfdilxvwxtbcd.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
